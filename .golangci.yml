run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - errorlint
    - gocritic
    - gocyclo
    - gofumpt
    - goimports
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: package-comments
        severity: warning
        disabled: false
  goimports:
    local-prefixes: github.com/marmutapp/superbased-observer
  gosec:
    excludes:
      # G115 (integer overflow on numeric conversions) is categorically noisy on
      # this codebase's protobuf / varint / length parsing and is not a memory-
      # safety risk in Go: a bad conversion yields a wrong value, and any
      # downstream slice index is bounds-checked (recovered panic, never memory
      # corruption). Proving bounds to gosec would mean restructuring every
      # parser for zero security gain. All OTHER gosec rules stay enabled; the
      # SQL (G201/G202) and subprocess (G204) findings are justified per-line.
      - G115
  gocyclo:
    # Spec §2.7 targets a threshold of 15. The existing (pre-Teams) codebase has
    # ~250 functions over 15 across ~30 packages, so 15 cannot be enforced now
    # without grandfathering nearly the whole repo (which would make gocyclo
    # gate nothing). Enforced at 30 today — which genuinely gates new complexity
    # tree-wide (only 20 pre-existing functions exceed it, all excluded below) —
    # and ratcheted toward 15 during the post-Teams complexity refactor
    # (tracked in PROGRESS.md / docs/handover-teams-M5-*).
    min-complexity: 30

issues:
  # Report every finding (golangci-lint defaults hide the 4th+ identical
  # message and cap each linter at 50) so CI and `make lint` show the full
  # picture rather than a truncated sample.
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - testdata
    - bin
    - scripts
    # oapi-codegen output (DO NOT EDIT). Declaring security schemes used only
    # by documentation-tagged operations emits unused context-key types that
    # `unused` would flag; generated code is regenerated deterministically and
    # is not hand-maintained, so it is excluded from lint.
    - internal/orgserver/api/gen
    - internal/orgserver/dashboard/gen
    - internal/orgclient/gen
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - revive
    # Test fixtures legitimately use conventional 0644 file permissions (G306),
    # embed dummy/sample credentials (G101) and use math/rand (G404) — none
    # carry production secrets or run in production. gosec on test code is noise.
    - path: _test\.go
      linters:
        - gosec
    # Cyclomatic complexity on test functions is noise — table-driven tests
    # legitimately enumerate many cases through one func. gocyclo is a
    # production-code signal, so exclude it from tests.
    - path: _test\.go
      linters:
        - gocyclo
    # The 20 pre-existing functions that exceed the enforced gocyclo threshold
    # of 30 (the Codex parser ParseSessionFile reaches 249, ParseStructured
    # Trajectory 161, newBackfillCmd 139, the proxy serve loop 76, ...). These
    # are shipped parsers, the proxy hot path, store.Ingest, dashboard handlers
    # and the backfill suite — refactoring them inside the M5 release-hardening
    # PR would risk the byte-identical / never-break-the-host-tool invariant for
    # zero Teams benefit. Scoped out here and tracked for an incremental refactor
    # AFTER the Teams feature lands (PROGRESS.md / docs/handover-teams-M5-*),
    # which also ratchets min-complexity down toward the spec's 15. Files added
    # outside this list stay gated at 30.
    - path: 'cmd/observer/(backfill|hook|init|start)\.go'
      linters:
        - gocyclo
    - path: 'internal/adapter/antigravity/(adapter|structured)\.go'
      linters:
        - gocyclo
    - path: 'internal/adapter/(claudecode|codex|cursor)/adapter\.go'
      linters:
        - gocyclo
    - path: 'internal/adapter/copilotcli/events\.go'
      linters:
        - gocyclo
    - path: 'internal/intelligence/dashboard/(analysis|dashboard|export)\.go'
      linters:
        - gocyclo
    - path: 'internal/proxy/proxy\.go'
      linters:
        - gocyclo
    - path: 'internal/store/store\.go'
      linters:
        - gocyclo
