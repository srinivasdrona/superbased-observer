run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: package-comments
        severity: warning
        disabled: false
  goimports:
    local-prefixes: github.com/marmutapp/superbased-observer

issues:
  exclude-dirs:
    - testdata
    - bin
    - scripts
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - revive
